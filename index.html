<!DOCTYPE html>
<html lang="en"> 

<!-- Meta Tags -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<!-- Body of the Login Page -->
<body>
    <div class="login-container"> <!-- Login Container -->
        <form class="login-form"> <!-- Login Form -->
            <div class="header"> <!-- Header Section -->
                <h2>Welcome Back</h2>
                <p>Please enter your details</p>
            </div>

            <div class="input-group"> <!-- Username Input Group -->
                <label for="username">Username</label> 
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>

            <div class="input-group"> <!-- Password Input Group -->
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <div class="actions"> <!-- Actions Section -->
                <label class="checkbox-container"> <!-- Remember Me Checkbox -->
                    <input type="checkbox" name="remember">
                    <span class="checkmark"></span>
                    Remember Me
                </label>
                <a href="#" class="forgot-link">Forgot Password?</a> <!-- Forgot Password Link -->
            </div>

            <button type="submit" class="login-btn">Login</button> <!-- Login Button -->

            <div class="footer">
                <p>Don't have an account? <a href="#">Register</a></p> <!-- Registration Link -->
            </div>

        </form>
    </div>
</body>

</html>
